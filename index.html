<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEDDING INVITATION | 瀬越空人 ・ 夢希</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全体・ベーススタイル --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #fcfbfa;
            color: #333333;
            line-height: 1.8;
            letter-spacing: 0.08em;
            -webkit-font-smoothing: antialiased;
        }
        
        /* スマホの不自然な改行防止 */
        .nobrk {
            display: inline-block;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 0 30px rgba(0,0,0,0.03);
            padding-bottom: 60px;
        }

        /* --- 1. メインビジュアル（大写真1枚） --- */
        .hero {
            position: relative;
            width: 100%;
            height: 80vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        /* 写真の上に薄いスモークを重ねて文字を見やすく */
        .hero::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 2;
        }
        .hero-title {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            text-align: center;
            color: #ffffff;
            text-shadow: 1px 1px 10px rgba(0,0,0,0.5);
            z-index: 3;
        }
        .hero-title h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 5px;
        }
        .hero-title p {
            font-size: 0.85rem;
            letter-spacing: 0.15em;
        }

        /* --- セクション共通 --- */
        section {
            padding: 60px 24px;
            text-align: center;
        }
        .section-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            color: #a68f6d; /* 洗練されたアンティークゴールド */
            margin-bottom: 30px;
            position: relative;
        }
        .section-title::after {
            content: '';
            display: block;
            width: 30px;
            height: 1px;
            background-color: #a68f6d;
            margin: 12px auto 0;
        }

        /* --- 2. ご挨拶文 --- */
        .greeting-text {
            font-size: 0.9rem;
            font-weight: 300;
            color: #4a4a4a;
        }
        .greeting-text p {
            margin-bottom: 20px;
        }
        .names {
            margin-top: 40px;
            font-size: 1.05rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            line-height: 2.2;
        }

        /* --- 3. 写真ギャラリー（モノクロ→カラーギミック） --- */
        .gallery-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 12px;
            margin-top: 10px;
        }
        .gallery-item {
            position: relative;
            width: 100%;
            padding-top: 100%; /* 正方形を維持 */
            overflow: hidden;
            border-radius: 2px;
            background-color: #f0f0f0;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .gallery-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .gallery-item:hover img,
        .gallery-item:active img {
            filter: grayscale(0%);
            transform: scale(1.05);
        }

        /* --- 4. イベント詳細 --- */
        .details-table {
            text-align: left;
            max-width: 480px;
            margin: 0 auto;
        }
        .details-item {
            margin-bottom: 30px;
        }
        .details-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a68f6d;
            border-left: 2px solid #a68f6d;
            padding-left: 8px;
            margin-bottom: 8px;
            letter-spacing: 0.1em;
        }
        .details-value {
            font-size: 0.9rem;
            color: #333333;
            padding-left: 10px;
        }
        .details-value .highlight {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .note-text {
            font-size: 0.8rem;
            color: #666666;
            margin-top: 8px;
            line-height: 1.6;
        }

        /* --- ボタン（Google Map） --- */
        .btn-maps {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            border: 1px solid #a68f6d;
            color: #a68f6d;
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            border-radius: 2px;
        }
        .btn-maps:hover {
            background-color: #a68f6d;
            color: #ffffff;
        }

        /* --- 5. 出欠案内＆Googleフォーム --- */
        .attendance-intro {
            font-size: 0.85rem;
            color: #4a4a4a;
            max-width: 480px;
            margin: 0 auto 30px;
            text-align: left;
            background-color: #faf8f5;
            padding: 20px;
            border-radius: 4px;
        }
        .attendance-intro ul {
            margin-top: 12px;
            padding-left: 18px;
        }
        .attendance-intro li {
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .deadline {
            text-align: center;
            font-weight: 600;
            color: #d15151;
            margin-bottom: 15px;
            font-size: 1rem;
        }
        
        .form-container {
            position: relative;
            width: 100%;
            padding: 0 4px;
            margin-top: 20px;
            overflow: hidden;
        }
        .form-container iframe {
            display: block;
            width: 100%;
            height: 950px;
            border: none;
            background-color: transparent;
        }

        /* --- フッター --- */
        footer {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            color: #aaaaaa;
            margin-top: 40px;
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div class="container">

    <header class="hero">
        <img src="IMG_1.jpeg" alt="Main Visual" class="hero-img">
        <div class="hero-title">
            <h1>WEDDING INVITATION</h1>
            <p>2026.12.12 TSUNAMACHI MITSUI CLUB</p>
        </div>
    </header>
